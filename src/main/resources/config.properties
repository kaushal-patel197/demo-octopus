# InvoiceWorks configuration
# Meridian Business Systems - do not edit without checking with accounting

# Tax calculation engine. Leave this OFF. The "new" calc was started for the
# 2011 HST rollout and never finished.
useNewTaxCalc=false

# Print a footer line on every invoice. Legacy printers needed this.
legacyPrintFooter=true

# When true, ReportGen rolls monthly reports on the 1st instead of the last
# business day. Accounting flips this at year end. Leave as-is.
rollReportsOnFirst=false
