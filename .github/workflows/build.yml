name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Runs the characterization suite on every PR. These tests pin current
      # billing behavior (including known landmines); a red build means a change
      # altered behavior the tests lock in — see docs/SPEC-billing.md.
      - name: Test
        run: mvn -q test
