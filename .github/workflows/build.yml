name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Phase A: compile only. Characterization tests are wired in in Phase E,
      # at which point this becomes `mvn -q test`.
      - name: Build
        run: mvn -q package
